<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>School360 Pro | CBC Multi‑Tenant School Management</title>
  <!-- Tailwind + Font Awesome + Chart.js -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .transition-smooth { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm sticky top-0 z-50 border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-2">
          <div class="h-8 w-8 bg-indigo-600 rounded-xl flex items-center justify-center"><i class="fas fa-graduation-cap text-white text-sm"></i></div>
          <span class="font-bold text-xl tracking-tight">School<span class="text-indigo-600">360 Pro</span></span>
          <span class="hidden md:inline-block text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full ml-2">CBC Enterprise</span>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-500"><i class="fas fa-building"></i> Greenhill Academy</span>
          <button id="roleSwitcherBtn" class="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full text-sm font-medium flex items-center gap-2"><i class="fas fa-user-shield"></i> <span id="currentRoleLabel">Admin</span> <i class="fas fa-chevron-down text-xs"></i></button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Role Dropdown -->
  <div id="roleDropdown" class="hidden absolute right-4 top-16 mt-1 w-40 bg-white rounded-lg shadow-lg border z-50">
    <button data-role="admin" class="role-option w-full text-left px-4 py-2 hover:bg-indigo-50 text-sm">👑 Admin View</button>
    <button data-role="teacher" class="role-option w-full text-left px-4 py-2 hover:bg-indigo-50 text-sm">👩‍🏫 Teacher View</button>
    <button data-role="parent" class="role-option w-full text-left px-4 py-2 hover:bg-indigo-50 text-sm">👪 Parent View</button>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- Stats Grid (dynamic) -->
    <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8"></div>
    <!-- Main Dashboard Panel -->
    <div id="dashboardContent" class="space-y-6"></div>
  </main>

  <!-- M-Pesa Modal -->
  <div id="mpesaModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
      <div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold"><i class="fas fa-phone-alt text-green-600 mr-2"></i>M-Pesa Express</h3><button id="closeMpesaModal" class="text-gray-400"><i class="fas fa-times"></i></button></div>
      <p class="text-gray-600 text-sm mb-4">Pay school fees securely via M-Pesa (demo)</p>
      <input type="text" id="mpesaPhone" placeholder="0712345678" class="w-full border rounded-lg px-4 py-2 mb-3" value="0712345678">
      <p class="text-indigo-700 font-semibold" id="modalFeeAmount">Amount: KES 0</p>
      <div class="flex gap-3 mt-4"><button id="confirmMpesaBtn" class="bg-green-600 text-white px-5 py-2 rounded-full w-full font-semibold hover:bg-green-700"><i class="fab fa-mpesa mr-1"></i> Pay with M-Pesa</button></div>
    </div>
  </div>

  <!-- Assessment Entry Modal -->
  <div id="assessmentModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl max-w-md w-full p-6">
      <h3 class="text-xl font-bold mb-3">Record Assessment Result</h3>
      <div id="assessmentModalContent"></div>
      <div class="flex justify-end mt-4 gap-2"><button id="closeAssessmentModal" class="px-4 py-2 bg-gray-200 rounded-lg">Cancel</button><button id="saveAssessmentResult" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Save & Compute CBC Level</button></div>
    </div>
  </div>

  <script>
    // --------------------------------------------------------------
    // 1. MOCK DATA MODELS (mirroring production PostgreSQL/Prisma)
    // --------------------------------------------------------------
    const school = { id: "sch_1", name: "Greenhill Academy", code: "GHA" };

    // Users
    const users = [
      { id: "u1", email: "admin@greenhill.ac.ke", role: "ADMIN", firstName: "James", lastName: "Otieno", schoolId: "sch_1" },
      { id: "u2", email: "teacher@greenhill.ac.ke", role: "TEACHER", firstName: "Grace", lastName: "Mwangi", schoolId: "sch_1", teacherClasses: ["class_5east", "class_6west"] },
      { id: "u3", email: "parent@example.com", role: "PARENT", firstName: "Mary", lastName: "Ochieng", schoolId: "sch_1" }
    ];

    // Classes
    const classes = [
      { id: "class_5east", name: "Grade 5 East", level: "PRIMARY", academicYear: "2025" },
      { id: "class_6west", name: "Grade 6 West", level: "PRIMARY", academicYear: "2025" }
    ];

    // Students
    const students = [
      { id: "stu1", admissionNo: "S001", firstName: "Amara", lastName: "Ochieng", classId: "class_5east", parentUserId: "u3", feeBalance: 12500, feesPaid: 24500, totalDue: 37000 },
      { id: "stu2", admissionNo: "S002", firstName: "Brian", lastName: "Mwangi", classId: "class_5east", parentUserId: null, feeBalance: 5200, feesPaid: 31800, totalDue: 37000 }
    ];

    // Subjects (Learning Areas)
    const subjects = [
      { id: "subj_math", name: "Mathematics", code: "MAT", defaultWeeklyPeriods: 5, category: "CORE" },
      { id: "subj_eng", name: "English", code: "ENG", defaultWeeklyPeriods: 5, category: "CORE" },
      { id: "subj_sci", name: "Science & Technology", code: "SCI", defaultWeeklyPeriods: 4, category: "CORE" }
    ];

    // Strands & Sub-strands (CBC structure)
    const strands = [
      { id: "str_num", name: "Numbers", subjectId: "subj_math" },
      { id: "str_frac", name: "Fractions", subjectId: "subj_math" }
    ];
    const subStrands = [
      { id: "sub_fraction_op", name: "Operations with Fractions", strandId: "str_frac" },
      { id: "sub_place_value", name: "Place Value", strandId: "str_num" }
    ];

    // ClassSubjects (offered subjects per class)
    const classSubjects = [
      { id: "cs_math_5east", classId: "class_5east", subjectId: "subj_math", weeklyPeriods: 5, teacherId: "u2" },
      { id: "cs_eng_5east", classId: "class_5east", subjectId: "subj_eng", weeklyPeriods: 5, teacherId: "u2" },
      { id: "cs_sci_5east", classId: "class_5east", subjectId: "subj_sci", weeklyPeriods: 4, teacherId: "u2" }
    ];

    // Assessment Tasks (linked to sub-strand)
    let assessments = [
      { id: "ass_math_cat1", title: "Fractions CAT", type: "FORMATIVE", subjectId: "subj_math", classId: "class_5east", term: "Term 1 2025", maxScore: 50, weight: 0.3, dueDate: "2025-03-20", tasks: [{ subStrandId: "sub_fraction_op", maxScore: 50, cbcMapping: { BE: [0,39], AE: [40,59], ME: [60,79], EE: [80,100] } }] }
    ];

    // Assessment Results (student scores)
    let assessmentResults = [
      { id: "res1", studentId: "stu1", assessmentTaskId: "ass_math_cat1", scoreObtained: 42, remarks: "Good attempt", createdAt: new Date() }
    ];

    // Timetable Slots (conflict simulation)
    let timetableSlots = [
      { id: "ts1", timetableId: "tt_term1", dayOfWeek: "MONDAY", periodNumber: 1, classId: "class_5east", classSubjectId: "cs_math_5east", teacherId: "u2", roomId: "room101", startTime: "08:00", endTime: "08:40" }
    ];
    const rooms = [{ id: "room101", name: "Lab 1", capacity: 30 }];

    // Helper: get student by id
    function getStudent(id) { return students.find(s => s.id === id); }
    function getClassSubjects(classId) { return classSubjects.filter(cs => cs.classId === classId); }
    function getSubject(id) { return subjects.find(s => s.id === id); }

    // CBC Level mapping from numeric score
    function getCBCLevel(score, maxScore, mapping) {
      const percent = (score / maxScore) * 100;
      if (percent >= 80) return "EE";
      if (percent >= 60) return "ME";
      if (percent >= 40) return "AE";
      return "BE";
    }

    // Compute overall CBC level for a student in a subject (average of tasks)
    function computeSubjectCBCLevel(studentId, subjectId, term) {
      const subjectAssessments = assessments.filter(a => a.subjectId === subjectId && a.classId === students.find(s=>s.id===studentId).classId && a.term === term);
      let totalPercent = 0, count = 0;
      for (let ass of subjectAssessments) {
        const result = assessmentResults.find(r => r.studentId === studentId && r.assessmentTaskId === ass.id);
        if (result) {
          const taskDef = ass.tasks[0];
          const percent = (result.scoreObtained / taskDef.maxScore) * 100;
          totalPercent += percent;
          count++;
        }
      }
      if (count === 0) return "Not graded";
      const avgPercent = totalPercent / count;
      if (avgPercent >= 80) return "EE";
      if (avgPercent >= 60) return "ME";
      if (avgPercent >= 40) return "AE";
      return "BE";
    }

    // ------------------ ROLE MANAGEMENT ------------------
    let currentRole = "admin";
    function renderStats() {
      const statsDiv = document.getElementById('statsGrid');
      if (currentRole === 'admin') {
        statsDiv.innerHTML = `<div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-indigo-500"><div class="flex justify-between"><span>Total Students</span><i class="fas fa-users text-indigo-400"></i></div><p class="text-2xl font-bold">342</p></div>
        <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-emerald-500"><div class="flex justify-between"><span>Avg CBC Score</span><i class="fas fa-chart-line text-emerald-400"></i></div><p class="text-2xl font-bold">76.4%</p></div>
        <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-amber-500"><div class="flex justify-between"><span>Fees Collected</span><i class="fas fa-coins text-amber-400"></i></div><p class="text-2xl font-bold">KES 1.24M</p></div>
        <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-rose-500"><div class="flex justify-between"><span>Active Staff</span><i class="fas fa-chalkboard-user text-rose-400"></i></div><p class="text-2xl font-bold">28</p></div>`;
      } else if (currentRole === 'teacher') {
        statsDiv.innerHTML = `<div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between"><span>My Classes</span><i class="fas fa-school text-indigo-400"></i></div><p class="text-2xl font-bold">2</p><span>Grade 5 East, Grade 6 West</span></div>
        <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between"><span>Pending Assessments</span><i class="fas fa-tasks text-amber-400"></i></div><p class="text-2xl font-bold">3</p></div>
        <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between"><span>Avg Class Performance</span><i class="fas fa-chart-simple text-emerald-400"></i></div><p class="text-2xl font-bold">74.2%</p></div>
        <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between"><span>Lessons Planned</span><i class="fas fa-calendar-check text-indigo-400"></i></div><p class="text-2xl font-bold">14</p></div>`;
      } else { // parent
        const child = students.find(s => s.parentUserId === "u3");
        statsDiv.innerHTML = `<div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between"><span>Child: ${child.firstName} ${child.lastName}</span><i class="fas fa-child text-indigo-400"></i></div><p class="text-lg font-semibold">Grade ${classes.find(c=>c.id===child.classId).name}</p></div>
        <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between"><span>Overall CBC Level</span><i class="fas fa-star text-yellow-400"></i></div><p class="text-2xl font-bold">ME</p></div>
        <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between"><span>Fee Balance</span><i class="fas fa-wallet text-red-500"></i></div><p class="text-2xl font-bold">KES ${child.feeBalance.toLocaleString()}</p><button id="parentPayBtn" class="mt-2 text-xs bg-indigo-100 px-3 py-1 rounded-full">Pay now</button></div>
        <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between"><span>Attendance</span><i class="fas fa-calendar-alt text-green-500"></i></div><p class="text-2xl font-bold">94%</p></div>`;
        document.getElementById('parentPayBtn')?.addEventListener('click', () => { document.getElementById('modalFeeAmount').innerText = `Amount: KES ${child.feeBalance}`; document.getElementById('mpesaModal').classList.remove('hidden'); document.getElementById('mpesaModal').classList.add('flex'); window._payStudentId = child.id; });
      }
    }

    // ------------------ RENDER MAIN CONTENT ------------------
    function renderMainContent() {
      const container = document.getElementById('dashboardContent');
      if (currentRole === 'admin') {
        container.innerHTML = `
          <div class="bg-white rounded-2xl shadow-sm p-5"><h2 class="font-bold text-lg"><i class="fas fa-chart-line text-indigo-500"></i> CBC Competency Trends (Grade 5-6)</h2><canvas id="adminChart" height="100"></canvas></div>
          <div class="grid md:grid-cols-2 gap-6"><div class="bg-white p-5 rounded-2xl"><h3 class="font-semibold">Recent Assessments</h3><table class="w-full text-sm"><thead><tr><th>Student</th><th>Math</th><th>English</th><th>Science</th></tr></thead><tbody>${students.map(s => `<tr><td>${s.firstName}</td><td>${computeSubjectCBCLevel(s.id,"subj_math","Term 1 2025")}</td><td>${computeSubjectCBCLevel(s.id,"subj_eng","Term 1 2025")}</td><td>${computeSubjectCBCLevel(s.id,"subj_sci","Term 1 2025")}</td></tr>`).join('')}</tbody></table></div>
          <div class="bg-white p-5 rounded-2xl"><h3 class="font-semibold">Fee Collection</h3><div class="h-32 flex items-center justify-center bg-gray-100 rounded">Graph placeholder</div><button class="mt-3 bg-indigo-50 text-indigo-700 w-full py-2 rounded-lg">Export Report</button></div></div>`;
        new Chart(document.getElementById('adminChart'), { type: 'line', data: { labels: ['W1','W2','W3','W4'], datasets: [{ label: 'Math', data: [68,72,78,82], borderColor: '#4f46e5' }] } });
      } 
      else if (currentRole === 'teacher') {
        container.innerHTML = `
          <div class="bg-white rounded-2xl shadow-sm p-5"><div class="flex justify-between"><h2 class="font-bold"><i class="fas fa-clipboard-list"></i> My Assessments (Grade 5 East)</h2><button id="newAssessmentBtn" class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-sm">+ New Assessment</button></div>
          <div class="overflow-x-auto mt-3"><table class="min-w-full text-sm"><thead><tr><th>Title</th><th>Subject</th><th>Sub-strand</th><th>Actions</th></tr></thead><tbody id="teacherAssessmentList"></tbody></table></div></div>
          <div class="bg-white rounded-2xl shadow-sm p-5 mt-6"><h3 class="font-bold"><i class="fas fa-calendar-week"></i> Weekly Timetable (Grade 5 East) – Conflict Check Enabled</h3><div id="timetableGrid" class="grid grid-cols-6 gap-2 mt-3 text-center text-sm"></div><p id="conflictMsg" class="text-red-500 text-xs mt-2"></p></div>`;
        renderTeacherAssessments();
        renderTimetable();
        document.getElementById('newAssessmentBtn')?.addEventListener('click', () => openNewAssessmentModal());
      } 
      else { // Parent
        const child = students.find(s => s.parentUserId === "u3");
        container.innerHTML = `
          <div class="bg-white rounded-2xl shadow-sm p-5"><h2 class="text-xl font-bold">${child.firstName}'s CBC Progress Report – Term 1 2025</h2>
          <div id="parentReportCard" class="mt-4"></div><button id="genReportBtn" class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded-lg">Download Full Report Card</button></div>
          <div class="bg-white rounded-2xl shadow-sm p-5 mt-6"><h3 class="font-semibold">Fee Payment History</h3><p class="text-2xl font-bold">Balance: KES ${child.feeBalance.toLocaleString()}</p><div class="w-full bg-gray-200 rounded-full h-2 mt-2"><div class="bg-emerald-500 h-2 rounded-full" style="width:${(child.feesPaid/child.totalDue)*100}%"></div></div><button id="parentQuickPay" class="mt-3 bg-green-100 text-green-700 px-4 py-2 rounded-lg"><i class="fab fa-mpesa"></i> Pay with M-Pesa</button></div>`;
        renderParentReportCard(child);
        document.getElementById('parentQuickPay')?.addEventListener('click', () => { document.getElementById('modalFeeAmount').innerText = `Amount: KES ${child.feeBalance}`; document.getElementById('mpesaModal').classList.remove('hidden'); document.getElementById('mpesaModal').classList.add('flex'); window._payStudentId = child.id; });
        document.getElementById('genReportBtn')?.addEventListener('click', () => alert("PDF Report Card generated (demo). CBC Levels: Maths ME, English EE, Science ME."));
      }
    }

    function renderTeacherAssessments() {
      const tbody = document.getElementById('teacherAssessmentList');
      if (!tbody) return;
      tbody.innerHTML = assessments.map(ass => `<tr><td>${ass.title}</td><td>${getSubject(ass.subjectId).name}</td><td>Fractions</td><td><button class="recordScoreBtn text-indigo-600" data-id="${ass.id}">Record Scores</button></td></tr>`).join('');
      document.querySelectorAll('.recordScoreBtn').forEach(btn => btn.addEventListener('click', (e) => openRecordModal(e.target.dataset.id)));
    }

    function openRecordModal(assessmentId) {
      const ass = assessments.find(a => a.id === assessmentId);
      const modal = document.getElementById('assessmentModal');
      document.getElementById('assessmentModalContent').innerHTML = `<p class="mb-2">${ass.title} (Max: ${ass.tasks[0].maxScore})</p><input type="text" id="studentIdInput" placeholder="Student ID (stu1, stu2)" class="w-full border p-2 rounded mb-2"><input type="number" id="scoreInput" placeholder="Score" class="w-full border p-2 rounded"><textarea id="remarksInput" placeholder="Remarks" class="w-full border p-2 rounded mt-2"></textarea>`;
      modal.classList.remove('hidden'); modal.classList.add('flex');
      window._currentAssessment = ass;
    }

    document.getElementById('saveAssessmentResult')?.addEventListener('click', () => {
      const ass = window._currentAssessment;
      const studentId = document.getElementById('studentIdInput').value;
      const score = parseFloat(document.getElementById('scoreInput').value);
      const remarks = document.getElementById('remarksInput').value;
      if (!studentId || isNaN(score)) return alert("Valid inputs required");
      const task = ass.tasks[0];
      const cbcLevel = getCBCLevel(score, task.maxScore, task.cbcMapping);
      assessmentResults.push({ id: "res"+Date.now(), studentId, assessmentTaskId: ass.id, scoreObtained: score, remarks, createdAt: new Date() });
      alert(`Saved! CBC Level: ${cbcLevel}`);
      document.getElementById('assessmentModal').classList.add('hidden');
      renderMainContent();
    });

    // Timetable rendering with conflict simulation
    function renderTimetable() {
      const gridDiv = document.getElementById('timetableGrid');
      if (!gridDiv) return;
      const days = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY'];
      const periods = [1,2,3,4,5];
      let html = `<div class="font-bold"></div>${days.map(d=>`<div class="font-bold">${d.slice(0,3)}</div>`).join('')}`;
      for (let p of periods) {
        html += `<div class="font-bold">P${p}</div>`;
        for (let d of days) {
          const existing = timetableSlots.find(s => s.dayOfWeek === d && s.periodNumber === p && s.classId === "class_5east");
          if (existing) {
            const subj = classSubjects.find(cs => cs.id === existing.classSubjectId);
            html += `<div class="bg-indigo-100 p-1 rounded text-xs">${subj ? getSubject(subj.subjectId).name : 'Subject'}</div>`;
          } else {
            html += `<div class="bg-gray-50 border rounded p-1 text-xs text-gray-400"><button class="addSlotBtn text-indigo-500" data-day="${d}" data-period="${p}">+ Add</button></div>`;
          }
        }
      }
      gridDiv.innerHTML = html;
      document.querySelectorAll('.addSlotBtn').forEach(btn => btn.addEventListener('click', (e) => {
        const day = e.target.dataset.day;
        const period = parseInt(e.target.dataset.period);
        const conflict = timetableSlots.some(s => s.dayOfWeek === day && s.periodNumber === period && (s.teacherId === "u2" || s.roomId === "room101"));
        if (conflict) document.getElementById('conflictMsg').innerText = "Conflict! Teacher or room already booked at this time.";
        else {
          timetableSlots.push({ id: "new", timetableId: "tt_term1", dayOfWeek: day, periodNumber: period, classId: "class_5east", classSubjectId: "cs_math_5east", teacherId: "u2", roomId: "room101" });
          renderTimetable();
          document.getElementById('conflictMsg').innerText = "Slot added successfully (no conflict).";
        }
      }));
    }

    function openNewAssessmentModal() { alert("Demo: Create assessment with Strand/Sub‑strand mapping."); }

    function renderParentReportCard(child) {
      const container = document.getElementById('parentReportCard');
      const subjectsForClass = classSubjects.filter(cs => cs.classId === child.classId);
      let html = `<table class="w-full text-sm border"><thead><tr><th>Subject</th><th>CBC Level</th><th>Teacher Remarks</th></tr></thead><tbody>`;
      for (let cs of subjectsForClass) {
        const sub = getSubject(cs.subjectId);
        const level = computeSubjectCBCLevel(child.id, sub.id, "Term 1 2025");
        html += `<tr><td>${sub.name}</td><td><span class="px-2 py-1 rounded-full text-xs ${level==='ME'?'bg-green-100':level==='EE'?'bg-blue-100':'bg-yellow-100'}">${level}</span></td><td>Performs well in ${sub.name}</td></tr>`;
      }
      html += `</tbody></table><p class="mt-4 text-sm">Class Teacher Remark: Amara is a focused learner. <br/>Principal Remark: Continue nurturing talent.</p>`;
      container.innerHTML = html;
    }

    // Role switcher
    document.getElementById('roleSwitcherBtn')?.addEventListener('click', (e) => { document.getElementById('roleDropdown').classList.toggle('hidden'); });
    document.querySelectorAll('.role-option').forEach(btn => btn.addEventListener('click', (e) => {
      currentRole = btn.dataset.role;
      document.getElementById('currentRoleLabel').innerText = currentRole === 'admin' ? 'Admin' : (currentRole === 'teacher' ? 'Teacher' : 'Parent');
      document.getElementById('roleDropdown').classList.add('hidden');
      renderStats(); renderMainContent();
    }));
    document.getElementById('closeMpesaModal')?.addEventListener('click', () => { document.getElementById('mpesaModal').classList.add('hidden'); });
    document.getElementById('confirmMpesaBtn')?.addEventListener('click', () => {
      const phone = document.getElementById('mpesaPhone').value;
      if (!phone.match(/^07\d{8}$/)) return alert("Valid M-Pesa number required");
      alert(`Payment of ${document.getElementById('modalFeeAmount').innerText} successful. Ref: MPESA${Math.floor(Math.random()*10000)}`);
      if (window._payStudentId) {
        const student = students.find(s => s.id === window._payStudentId);
        if (student) { student.feeBalance = 0; student.feesPaid = student.totalDue; renderStats(); renderMainContent(); }
      }
      document.getElementById('mpesaModal').classList.add('hidden');
    });
    document.getElementById('closeAssessmentModal')?.addEventListener('click', () => document.getElementById('assessmentModal').classList.add('hidden'));

    // Initial load
    renderStats(); renderMainContent();
  </script>
  <footer class="border-t bg-white mt-12 py-6 text-center text-gray-500 text-xs">School360 Pro – CBC Multi‑tenant SaaS | Strand‑based assessments | Conflict‑free timetable | M‑Pesa ready</footer>
</body>
</html>
